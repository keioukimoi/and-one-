<!DOCTYPE html>
<html>
<head>
  <title>Disney Map Only</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    #map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <script>
    let map;

    function initMap() {
      const center = { lat: 35.6326, lng: 139.8806 };

      map = new google.maps.Map(
        document.getElementById("map"),
        {
          center: center,
          zoom: 17,
          minZoom: 15,
          maxZoom: 20,
          restriction: {
            latLngBounds: {
              north: 35.6405,
              south: 35.6250,
              west: 139.8700,
              east: 139.8900,
            },
            strictBounds: true
          },
          disableDefaultUI: true,
          clickableIcons: false,
          styles: [
            { featureType: "all", elementType: "geometry", stylers: [{ color: "#f5f1e8" }] },
            { featureType: "water", elementType: "geometry", stylers: [{ color: "#b9e6ff" }] },
            { featureType: "road", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
            { featureType: "poi", stylers: [{ visibility: "off" }] },
            { featureType: "transit", stylers: [{ visibility: "off" }] }
          ]
        }
      );
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCFBM-cOpL2SzVEcRfchjWfD3T09sDZW6E&libraries=places&callback=initMap">
  </script>

</body>
</html>
