<!DOCTYPE html>
<html>
  <head>
    <title>揚げどり軍団</title>
    <style>
      #map { height: 100%; width: 100%; }
      html, body { height: 100%; margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      // 地図を出すための命令をここに書く（またはindex.jsに書く）
      function initMap() {
        const center = { lat: 35.6326, lng: 139.8806 }; // 舞浜周辺
        const popsb = { lat: 35.6338108019477, lng: 139.88056946100153 };
        const map = new google.maps.Map(document.getElementById("map"), {
          zoom: 17,
          center: center,
        });
        new google.maps.Marker({ position: center, map: map });
        new google.maps.Marker({ position: popsb, map: map });
      }
    </script>
    <script async
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCFBM-cOpL2SzVEcRfchjWfD3T09sDZW6E&callback=initMap">
    </script>
  </body>
</html>
