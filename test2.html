<!DOCTYPE html>
<html>
  <head>
    <title>揚げどり軍団</title>
    <style>
      #map { height: 100%; width: 100%; }
      html, body { height: 100%; margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      // 地図を出すための命令をここに書く（またはindex.jsに書く）
      function initMap() {
        const center = { lat: 35.6326, lng: 139.8806 }; // 舞浜周辺
        const popsb = { lat: 35.6338108019477, lng: 139.88056946100153 };
        const map = new google.maps.Map(document.getElementById("map"), {
          zoom: 17,
          center: center,
                    // 【ここを追加しました！】表示範囲をディズニー周辺に制限する設定
          restriction: {
            latLngBounds: {
              north: 35.637544, // 北端のライン
              south: 35.627657, // 南端のライン
              east: 139.893391, // 東端のライン
              west: 139.868139  // 西端のライン
            },
            strictBounds: false // 枠の外に引きずり出そうとしたら滑らかに戻す
          },
          minZoom: 15, // これ以上ズームアウトして地球を見えなくする制限（迷子防止）
          maxZoom: 19,  // これ以上過剰にズームインできない制限

        // 【ここを新しく追加！】0.5刻みなどの小数点ズームを有効にする設定
          isFractionalZoomEnabled: true,
          clickableIcons: false,
          disableDefaultUI: true,    // ← 全てのUIを非表示（航空写真・人形など）
          styles: [
            {
              featureType: "poi",
              stylers: [{ visibility: "off" }]
             },
             {
              featureType: "transit",
              stylers: [{ visibility: "off" }]
             },
             {
                featureType: "all",
                elementType: "labels.text",
                stylers: [{ visibility: "off" }]
              }
            ]
          });
        new google.maps.Marker({ position: center, map: map });
        new google.maps.Marker({ position: popsb, map: map });
      }
    </script>
    <script async
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCFBM-cOpL2SzVEcRfchjWfD3T09sDZW6E&callback=initMap">
    </script>
  </body>
</html>
