<!DOCTYPE html>
<html>
  <head>
    <title>揚げ大</title>
    <style>
      #map { height: 100%; width: 100%; }
      html, body { height: 100%; margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script src="markers.js"></script>
    <script src="script.js"></script>
    <script>
      function initMap() {
        const center = { lat: 35.6326, lng: 139.8806 };
        const map = new google.maps.Map(document.getElementById("map"), {
          zoom: 16.5,
          center: center,
          restriction: {
            latLngBounds: {
              north: 35.637544,
              south: 35.627657,
              east: 139.893391,
              west: 139.868139
            },
            strictBounds: false
          },
          minZoom: 15,
          maxZoom: 19,
          isFractionalZoomEnabled: true,
          clickableIcons: false,
          disableDefaultUI: true,
          styles: [
            { featureType: "poi", stylers: [{ visibility: "off" }] },
            { featureType: "transit", stylers: [{ visibility: "off" }] },
            { featureType: "all", elementType: "labels.text", stylers: [{ visibility: "off" }] }
          ]
        });
        initializeMarkers(map);
      }
    </script>
    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCFBM-cOpL2SzVEcRfchjWfD3T09sDZW6E&callback=initMap"></script>
  </body>
</html>
