<!DOCTYPE html>

<html>
<head>
  <meta charset="utf-8">
  <title>揚げどり軍</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #map {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* 外枠画像 */
    #frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      object-fit: cover;
      pointer-events: none; /* マップ操作可能 */
      z-index: 9999;
    }
  </style>

</head>

<body>
  <div id="map"></div>

  <!-- 中央が透明なPNG -->

  <img id="frame" src="frame.png" alt="Frame">

  <script src="markers.js"></script>

  <script src="script.js"></script>

  <script>
    function initMap() {
      const center = { lat: 35.6326, lng: 139.8806 };

      const map = new google.maps.Map(
        document.getElementById("map"),
        {
          zoom: 16.5,
          center: center,

          restriction: {
            latLngBounds: {
              north: 35.637544,
              south: 35.627657,
              east: 139.893391,
              west: 139.868139
            },
            strictBounds: false
          },

          minZoom: 15,
          maxZoom: 19,

          isFractionalZoomEnabled: true,
          clickableIcons: false,
          disableDefaultUI: true,

          styles: [
            {
              featureType: "poi",
              stylers: [{ visibility: "off" }]
            },
            {
              featureType: "transit",
              stylers: [{ visibility: "off" }]
            },
            {
              featureType: "all",
              elementType: "labels.text",
              stylers: [{ visibility: "off" }]
            }
          ]
        }
      );

      initializeMarkers(map);
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCFBM-cOpL2SzVEcRfchjWfD3T09sDZW6E&callback=initMap">
  </script>

</body>
</html>
